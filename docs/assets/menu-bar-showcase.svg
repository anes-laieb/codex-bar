<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Codex Bar menu-bar states and open menu</title>
  <desc id="desc">Idle and working menu-bar states above a detailed Codex Bar menu and Quick Preferences submenu, using safe demo task names.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090d16"/>
      <stop offset="0.55" stop-color="#101827"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#242b37" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#171c25" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#183b8f"/>
      <stop offset="1" stop-color="#091b59"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.46"/>
    </filter>
    <filter id="blueGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; }
      .label { fill: #8ea0bb; font-size: 18px; font-weight: 700; letter-spacing: 2.5px; }
      .title { fill: #f7f9fc; font-size: 28px; font-weight: 700; }
      .body { fill: #d9dee8; font-size: 20px; font-weight: 500; }
      .muted { fill: #8994a6; font-size: 17px; font-weight: 500; }
      .menu { fill: #f1f4f8; font-size: 20px; font-weight: 540; }
      .menuMuted { fill: #9ca7b8; font-size: 16px; font-weight: 500; }
      .section { fill: #8f9aac; font-size: 15px; font-weight: 700; letter-spacing: 1.1px; }
      .shortcut { fill: #8f9aac; font-size: 17px; font-weight: 500; }
    </style>
  </defs>

  <rect width="1600" height="1120" rx="30" fill="url(#bg)"/>
  <circle cx="175" cy="104" r="160" fill="#315cff" opacity="0.08"/>
  <circle cx="1450" cy="1020" r="260" fill="#7b61ff" opacity="0.07"/>

  <!-- Idle state -->
  <g class="ui">
    <rect x="42" y="38" width="728" height="222" rx="24" fill="#121925" stroke="#293449" stroke-width="2"/>
    <text x="78" y="82" class="label">IDLE</text>
    <rect x="78" y="105" width="656" height="72" rx="16" fill="#05070b" stroke="#303847"/>
    <circle cx="111" cy="141" r="5" fill="#6f7c90"/>
    <circle cx="130" cy="141" r="5" fill="#6f7c90"/>
    <circle cx="149" cy="141" r="5" fill="#6f7c90"/>
    <text x="181" y="148" fill="#a9b2c1" font-size="19" font-weight="600">Finder</text>
