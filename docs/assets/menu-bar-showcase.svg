      <text x="490" y="502" class="menuMuted">1 working · 3 open</text>
      <line x1="425" y1="523" x2="885" y2="523" stroke="#3a4351"/>

      <text x="429" y="550" class="section">OPEN SESSIONS</text>
      <circle cx="440" cy="578" r="5" fill="#7b98ff"/>
      <text x="456" y="584" class="menu">codex-bar / Release 2.1.11</text>
      <text x="850" y="584" class="shortcut">›</text>
      <circle cx="440" cy="614" r="5" fill="#66c98c"/>
