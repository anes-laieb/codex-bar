    </g>
    <path d="M637 145c9-12 21-12 30 0M644 151c5-7 11-7 16 0" fill="none" stroke="#dce2ea" stroke-width="3" stroke-linecap="round"/>
    <rect x="681" y="130" width="31" height="20" rx="5" fill="none" stroke="#dce2ea" stroke-width="2"/>
    <rect x="712" y="136" width="4" height="8" rx="2" fill="#dce2ea"/>
    <text x="78" y="216" class="title">All caught up</text>
    <text x="302" y="216" class="muted">System artwork follows menu-bar contrast</text>
  </g>

  <!-- Working state -->
  <g class="ui">
    <rect x="830" y="38" width="728" height="222" rx="24" fill="#121925" stroke="#293449" stroke-width="2"/>
    <text x="866" y="82" class="label">WORKING</text>
    <rect x="866" y="105" width="656" height="72" rx="16" fill="#05070b" stroke="#303847"/>
    <text x="891" y="148" fill="#a9b2c1" font-size="19" font-weight="600">Codex</text>
    <g transform="translate(1135 141)" stroke="#7b98ff" stroke-width="4" stroke-linecap="round" filter="url(#blueGlow)">
      <path d="M0-12V12M-10-6L10 6M-10 6L10-6"/>
    </g>
    <text x="1162" y="148" fill="#dbe4ff" font-size="18" font-weight="650">02:14</text>
    <text x="1214" y="148" fill="#f4f7ff" font-size="18" font-weight="650">Thinking...</text>
    <text x="866" y="216" class="title">Live progress, no jitter</text>
    <text x="1163" y="216" class="muted">icon · timer · activity</text>
  </g>

  <!-- Open-menu showcase -->
  <g class="ui">
    <rect x="42" y="300" width="1516" height="778" rx="26" fill="#101722" stroke="#293449" stroke-width="2"/>
    <text x="78" y="346" class="label">MENU OPEN</text>
    <text x="1265" y="346" class="muted">Demo-safe task names</text>

    <!-- Desktop/menu-bar crop -->
    <rect x="78" y="370" width="1444" height="54" rx="14" fill="#05070b" stroke="#303847"/>
    <text x="105" y="405" fill="#a9b2c1" font-size="18" font-weight="600">Codex</text>
    <g transform="translate(1280 397)" stroke="#7b98ff" stroke-width="3.5" stroke-linecap="round">
      <path d="M0-10V10M-9-5L9 5M-9 5L9-5"/>
    </g>
    <text x="1300" y="404" fill="#dbe4ff" font-size="17" font-weight="650">04:37</text>
    <text x="1351" y="404" fill="#f4f7ff" font-size="17" font-weight="650">Reasoning..</text>

    <!-- Main menu -->
    <g filter="url(#shadow)">
      <rect x="405" y="438" width="500" height="590" rx="18" fill="url(#glass)" stroke="#3a4351"/>
      <rect x="425" y="457" width="50" height="50" rx="17" fill="url(#brand)" stroke="#3155a5"/>
      <g transform="translate(450 482)" stroke="#c7d7ff" stroke-width="3" stroke-linecap="round">
        <path d="M0-11V11M-9-5L9 5M-9 5L10-5"/>
        <path d="M12 8h12"/>
