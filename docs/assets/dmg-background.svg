<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101f"/>
      <stop offset="0.52" stop-color="#0b1732"/>
      <stop offset="1" stop-color="#050b16"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="62%">
      <stop offset="0" stop-color="#315cff" stop-opacity="0.28"/>
      <stop offset="0.48" stop-color="#203a99" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#07101f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8cb8ff" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#b8caff"/>
      <stop offset="1" stop-color="#8f7cff" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>

  <rect width="660" height="400" rx="18" fill="url(#surface)"/>
  <rect width="660" height="400" rx="18" fill="url(#glow)"/>
  <ellipse cx="330" cy="216" rx="220" ry="90" fill="#3766ff" opacity="0.08" filter="url(#blur)"/>

  <text x="330" y="49" text-anchor="middle" fill="#f7f9ff"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="25" font-weight="650">Codex Bar</text>
  <text x="330" y="74" text-anchor="middle" fill="#aab8d9"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13">Drag the app into Applications</text>

  <path d="M278 210 H370" fill="none" stroke="url(#arrow)" stroke-width="4" stroke-linecap="round"/>
  <path d="M354 195 L371 210 L354 225" fill="none" stroke="#c8d3ff" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round"/>

  <line x1="62" y1="333" x2="598" y2="333" stroke="#7894d6" stroke-opacity="0.18"/>
  <text x="330" y="365" text-anchor="middle" fill="#7f91b6"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12">Every Codex task. One beautifully calm place.</text>
</svg>
