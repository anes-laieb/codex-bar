<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2d31"/>
      <stop offset="1" stop-color="#202124"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="640" height="380" rx="14" fill="url(#bg)"/>

  <!-- faux menu bar -->
  <rect x="0" y="0" width="640" height="34" rx="14" fill="#1b1c1e"/>
  <rect x="0" y="14" width="640" height="20" fill="#1b1c1e"/>
  <text x="470" y="22" fill="#e8e8ea" font-size="13">􀙚  100%</text>
  <text x="540" y="22" fill="#e8e8ea" font-size="13">Wed 14:37</text>
  <circle cx="440" cy="17" r="7" fill="#f5c542"/>
  <text x="20" y="22" fill="#9aa0a6" font-size="12">Codex menu-bar indicator (SwiftBar / xbar)</text>

  <!-- three states -->
  <g transform="translate(40,70)">
    <text x="0" y="0" fill="#9aa0a6" font-size="13" letter-spacing="1">STATES</text>

    <g transform="translate(0,26)">
      <circle cx="10" cy="10" r="9" fill="#34c759"/>
      <text x="34" y="15" fill="#e8e8ea" font-size="16">idle</text>
      <text x="120" y="15" fill="#8a8f98" font-size="13">— waiting for you</text>
    </g>
    <g transform="translate(0,62)">
      <circle cx="10" cy="10" r="9" fill="#f5c542"/>
      <text x="34" y="15" fill="#e8e8ea" font-size="16">working</text>
      <text x="120" y="15" fill="#8a8f98" font-size="13">— a turn is in progress</text>
    </g>
    <g transform="translate(0,98)">
      <circle cx="10" cy="10" r="9" fill="#ff3b30"/>
      <text x="34" y="15" fill="#e8e8ea" font-size="16">needs approval</text>
      <text x="150" y="15" fill="#8a8f98" font-size="13">— waiting on an approval</text>
    </g>
    <g transform="translate(0,134)">
      <circle cx="10" cy="10" r="9" fill="#8a8f98"/>
      <text x="34" y="15" fill="#e8e8ea" font-size="16">unknown</text>
      <text x="120" y="15" fill="#8a8f98" font-size="13">— watcher not running</text>
    </g>
  </g>

  <!-- notification banner mock -->
  <g transform="translate(330,96)" filter="url(#shadow)">
    <rect width="270" height="118" rx="18" fill="#3a3c40"/>
    <rect x="18" y="20" width="40" height="40" rx="9" fill="#0a84ff"/>
    <text x="30" y="46" fill="#fff" font-size="20" font-weight="700">C</text>
    <text x="72" y="34" fill="#f2f2f7" font-size="14" font-weight="600">Codex — ready for you</text>
    <text x="72" y="56" fill="#c7c9cf" font-size="12">Pulled latest origin/main, created</text>
    <text x="72" y="73" fill="#c7c9cf" font-size="12">branch NSMobile, ran the pre-build</text>
    <text x="72" y="90" fill="#c7c9cf" font-size="12">audit. Branch clean — over to you.</text>
    <text x="18" y="106" fill="#8a8f98" font-size="11">now · click to focus Codex</text>
  </g>

  <text x="40" y="352" fill="#6b7078" font-size="12">Driven by the rollout-log watcher — no polling of Codex, no statusline API required.</text>
</svg>
