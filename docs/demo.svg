<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2d31"/><stop offset="1" stop-color="#202124"/>
    </linearGradient>
    <linearGradient id="appicon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6C63FF"/><stop offset="1" stop-color="#A64DFF"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <!-- 4-point sparkle, centred at 0,0 -->
    <path id="spk" d="M0,-10 L3,-3 L10,0 L3,3 L0,10 L-3,3 L-10,0 L-3,-3 Z"/>
  </defs>

  <rect width="760" height="470" rx="14" fill="url(#bg)"/>

  <!-- menu bar -->
  <rect x="0" y="0" width="760" height="34" rx="14" fill="#1b1c1e"/>
  <rect x="0" y="14" width="760" height="20" fill="#1b1c1e"/>
  <use href="#spk" transform="translate(556,17) scale(0.85)" fill="#ffd60a"/>
  <text x="572" y="22" fill="#e8e8ea" font-size="13" font-family="Menlo, monospace">Working</text>
  <text x="648" y="22" fill="#9aa0a6" font-size="13">Wed 14:37</text>

  <!-- app window -->
  <g filter="url(#sh)">
    <rect x="40" y="62" width="360" height="360" rx="14" fill="#33353a"/>
    <rect x="40" y="62" width="360" height="30" rx="14" fill="#3c3e44"/>
    <rect x="40" y="78" width="360" height="14" fill="#3c3e44"/>
    <text x="200" y="82" fill="#c7c9cf" font-size="12" text-anchor="middle">Codex Bar</text>
    <use href="#spk" transform="translate(72,124) scale(0.9)" fill="#ffd60a"/>
    <text x="90" y="130" fill="#f2f2f7" font-size="16" font-weight="700">Codex — working</text>
    <text x="64" y="162" fill="#ffd60a" font-size="13" font-family="Menlo, monospace">Cooking…</text>
    <text x="64" y="192" fill="#b8bcc4" font-size="13">Running for 2m 13s</text>
    <text x="64" y="216" fill="#b8bcc4" font-size="13">Project: Food-VTC</text>
    <text x="64" y="240" fill="#b8bcc4" font-size="13">Model: gpt-5.6-sol  ·  xhigh</text>
    <text x="64" y="272" fill="#8a8f98" font-size="12">Pulled latest origin/main, created branch…</text>
    <rect x="64" y="300" width="16" height="16" rx="4" fill="#0a84ff"/>
    <path d="M67,308 l3,3 l6,-7" stroke="#fff" stroke-width="2" fill="none"/>
    <text x="90" y="313" fill="#c7c9cf" font-size="13">Play completion sound</text>
    <rect x="64" y="330" width="16" height="16" rx="4" fill="#0a84ff"/>
    <path d="M67,338 l3,3 l6,-7" stroke="#fff" stroke-width="2" fill="none"/>
    <text x="90" y="343" fill="#c7c9cf" font-size="13">Launch at login</text>
    <text x="64" y="392" fill="#6b7078" font-size="10">Watches ~/.codex/sessions</text>
  </g>

  <!-- states -->
  <g transform="translate(448,120)">
    <text x="0" y="0" fill="#9aa0a6" font-size="13" letter-spacing="1">STATES</text>
    <use href="#spk" transform="translate(12,28) scale(0.8)" fill="#30d158"/>
    <text x="34" y="33" fill="#e8e8ea" font-size="15">idle</text>
    <use href="#spk" transform="translate(12,62) scale(0.8)" fill="#ffd60a"/>
    <text x="34" y="67" fill="#e8e8ea" font-size="15">working <tspan fill="#8a8f98" font-size="12">— cycling word</tspan></text>
    <use href="#spk" transform="translate(12,96) scale(0.8)" fill="#ff453a"/>
    <text x="34" y="101" fill="#e8e8ea" font-size="15">needs approval</text>
  </g>

  <!-- notification -->
  <g transform="translate(448,250)" filter="url(#sh)">
    <rect width="264" height="118" rx="18" fill="#3a3c40"/>
    <rect x="18" y="20" width="44" height="44" rx="11" fill="url(#appicon)"/>
    <use href="#spk" transform="translate(40,42) scale(1.15)" fill="#ffffff"/>
    <text x="74" y="38" fill="#f2f2f7" font-size="14" font-weight="600">Codex — ready for you</text>
    <text x="74" y="60" fill="#c7c9cf" font-size="12">Done. Branch is clean; ready</text>
    <text x="74" y="78" fill="#c7c9cf" font-size="12">for you to review.</text>
    <text x="18" y="104" fill="#8a8f98" font-size="10">now · click to focus Codex</text>
  </g>

  <text x="40" y="446" fill="#6b7078" font-size="12">Native app · watches the rollout logs · no SwiftBar, no polling, no statusline API.</text>
</svg>
