<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 430" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2d31"/><stop offset="1" stop-color="#202124"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="700" height="430" rx="14" fill="url(#bg)"/>

  <!-- menu bar -->
  <rect x="0" y="0" width="700" height="34" rx="14" fill="#1b1c1e"/>
  <rect x="0" y="14" width="700" height="20" fill="#1b1c1e"/>
  <text x="470" y="22" fill="#e8e8ea" font-size="13">100%</text>
  <text x="545" y="22" fill="#e8e8ea" font-size="13">Wed 14:37</text>
  <text x="392" y="23" font-size="15" font-weight="700" fill="#ffd60a" font-family="Menlo, monospace">&lt;/&gt;</text>
  <text x="420" y="23" font-size="13" fill="#e8e8ea">Working</text>
  <text x="474" y="23" font-size="13" fill="#ffd60a">❀</text>

  <!-- dropdown -->
  <g transform="translate(40,58)" filter="url(#sh)">
    <rect width="330" height="300" rx="14" fill="#33353a"/>
    <text x="20" y="34" font-size="15" font-weight="600" fill="#ffd60a" font-family="Menlo, monospace">&lt;/&gt;<tspan font-family="-apple-system" font-weight="600" fill="#f2f2f7">  Codex — working</tspan></text>
    <line x1="16" y1="48" x2="314" y2="48" stroke="#48494e"/>
    <text x="20" y="72" font-size="13" fill="#c7c9cf">Running for 2m 13s</text>
    <text x="20" y="96" font-size="13" fill="#c7c9cf">Project: Food-VTC</text>
    <text x="20" y="120" font-size="13" fill="#c7c9cf">Model: gpt-5.6-sol  ·  xhigh</text>
    <text x="20" y="144" font-size="13" fill="#c7c9cf">Approvals: never</text>
    <line x1="16" y1="160" x2="314" y2="160" stroke="#48494e"/>
    <text x="20" y="184" font-size="12" fill="#9aa0a6">Pulled latest origin/main, created branch…</text>
    <text x="20" y="206" font-size="12" fill="#8a8f98">Full message ▸</text>
    <line x1="16" y1="222" x2="314" y2="222" stroke="#48494e"/>
    <text x="20" y="246" font-size="11" fill="#8a8f98">Updated 1s ago</text>
    <text x="20" y="270" font-size="13" fill="#c7c9cf">Open watcher log</text>
    <text x="20" y="290" font-size="13" fill="#c7c9cf">Refresh</text>
  </g>

  <!-- states legend -->
  <g transform="translate(410,72)">
    <text x="0" y="0" fill="#9aa0a6" font-size="13" letter-spacing="1">STATES</text>
    <text x="0" y="30" font-size="16" font-weight="700" fill="#30d158" font-family="Menlo, monospace">&lt;/&gt;</text>
    <text x="40" y="30" fill="#e8e8ea" font-size="15">idle</text>
    <text x="0" y="62" font-size="16" font-weight="700" fill="#ffd60a" font-family="Menlo, monospace">&lt;/&gt;</text>
    <text x="40" y="62" fill="#e8e8ea" font-size="15">working <tspan fill="#ffd60a">❀</tspan> <tspan fill="#8a8f98" font-size="12">(animated)</tspan></text>
    <text x="0" y="94" font-size="16" fill="#ff453a">⚠</text>
    <text x="40" y="94" fill="#e8e8ea" font-size="15">needs approval</text>
  </g>

  <!-- notification -->
  <g transform="translate(410,190)" filter="url(#sh)">
    <rect width="250" height="112" rx="18" fill="#3a3c40"/>
    <rect x="16" y="18" width="38" height="38" rx="9" fill="#0a84ff"/>
    <text x="26" y="43" fill="#fff" font-size="17" font-weight="700" font-family="Menlo, monospace">&lt;/&gt;</text>
    <text x="66" y="32" fill="#f2f2f7" font-size="13" font-weight="600">Codex — ready for you</text>
    <text x="66" y="52" fill="#c7c9cf" font-size="11">Done. Branch is clean; ready for</text>
    <text x="66" y="68" fill="#c7c9cf" font-size="11">you to review.</text>
    <text x="16" y="98" fill="#8a8f98" font-size="10">now · click to focus Codex</text>
  </g>

  <text x="40" y="398" fill="#6b7078" font-size="12">Driven by the rollout-log watcher — live turn state, no polling of Codex, no statusline API.</text>
</svg>
